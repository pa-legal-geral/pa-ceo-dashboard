<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P&A CEO Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --pa-navy:#162E48;
  --pa-navy-dark:#0D1E2E;
  --pa-navy-medium:#254467;
  --pa-gold:#F3D399;
  --pa-gold-dark:#D4B375;
  --pa-grey:#585858;
  --pa-grey-light:#D1D1D1;
  --pa-bg:#F7F8FA;
  --pa-card:#FFFFFF;
  --pa-text:#162E48;
  --pa-text-muted:#585858;
  --pa-success:#10B981;
  --pa-warning:#F59E0B;
  --pa-danger:#EF4444;
  --pa-border:rgba(22,46,72,0.08);
  --shadow-sm:0 1px 3px rgba(22,46,72,0.06);
  --shadow-md:0 4px 24px rgba(22,46,72,0.08);
  --shadow-lg:0 12px 40px rgba(22,46,72,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter','Gotham','Montserrat',sans-serif;background:var(--pa-bg);color:var(--pa-text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit;text-decoration:none}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--pa-navy) 0%,var(--pa-navy-medium) 100%);padding:20px}
.login-box{background:white;padding:48px 40px;border-radius:16px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:24px;font-weight:700;color:var(--pa-navy);letter-spacing:-0.02em}
.login-logo p{margin-top:8px;color:var(--pa-text-muted);font-size:14px}
.login-box label{display:block;font-size:13px;font-weight:500;color:var(--pa-text);margin-bottom:6px;margin-top:16px}
.login-box input{width:100%;padding:12px 14px;border:1.5px solid var(--pa-grey-light);border-radius:8px;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:var(--pa-navy)}
.login-box button{width:100%;margin-top:24px;padding:14px;background:var(--pa-navy);color:white;font-weight:600;border-radius:8px;font-size:15px;transition:all .2s}
.login-box button:hover{background:var(--pa-navy-medium);transform:translateY(-1px)}
.login-box button[disabled]{opacity:0.5;cursor:not-allowed}
.login-error{margin-top:16px;padding:12px;background:#FEF2F2;color:var(--pa-danger);border-radius:8px;font-size:13px}

.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--pa-navy);color:white;padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:0 24px 24px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:16px}
.sidebar-logo h1{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;font-size:14px;color:rgba(255,255,255,0.7);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.05);color:white}
.nav-item.active{background:rgba(243,211,153,0.08);color:var(--pa-gold);border-left-color:var(--pa-gold);font-weight:500}
.nav-icon{width:18px;height:18px;display:inline-block;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.1);font-size:12px;color:rgba(255,255,255,0.5)}
.sidebar-footer .user-name{color:white;font-weight:500;font-size:13px;margin-bottom:2px}
.sidebar-footer .logout{margin-top:12px;padding:8px 12px;background:rgba(255,255,255,0.05);border-radius:6px;color:rgba(255,255,255,0.8);font-size:12px;width:100%;text-align:left;transition:all .2s}
.sidebar-footer .logout:hover{background:rgba(255,255,255,0.1);color:white}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:white;padding:20px 40px;border-bottom:1px solid var(--pa-border);display:flex;align-items:center;justify-content:space-between;gap:24px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:22px;font-weight:700;color:var(--pa-navy);letter-spacing:-0.02em}
.topbar-actions{display:flex;gap:12px;align-items:center}

.btn{padding:10px 18px;border-radius:8px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--pa-navy);color:white}
.btn-primary:hover{background:var(--pa-navy-medium);transform:translateY(-1px)}
.btn-gold{background:var(--pa-gold);color:var(--pa-navy);font-weight:700}
.btn-gold:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn-outline{background:white;color:var(--pa-navy);border:1.5px solid var(--pa-border)}
.btn-outline:hover{border-color:var(--pa-navy);background:#F7F8FA}
.btn-sm{padding:6px 12px;font-size:12px}
.btn[disabled]{opacity:0.5;cursor:not-allowed}

.content{flex:1;padding:32px 40px;max-width:100%;overflow-x:auto}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-pill{padding:8px 16px;background:white;border:1.5px solid var(--pa-border);border-radius:20px;font-size:13px;font-weight:500;color:var(--pa-text-muted);cursor:pointer;transition:all .15s}
.filter-pill:hover{border-color:var(--pa-navy);color:var(--pa-navy)}
.filter-pill.active{background:var(--pa-navy);color:white;border-color:var(--pa-navy)}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:32px}
.kpi-card{background:white;padding:24px;border-radius:12px;box-shadow:var(--shadow-sm);border:1.5px solid transparent;cursor:pointer;transition:all .2s}
.kpi-card:hover{border-color:var(--pa-navy);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-card.urgent{border-left:4px solid var(--pa-danger)}
.kpi-label{font-size:12px;color:var(--pa-text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px}
.kpi-value{font-size:36px;font-weight:800;color:var(--pa-navy);letter-spacing:-0.03em;line-height:1}
.kpi-value.danger{color:var(--pa-danger)}
.kpi-value.success{color:var(--pa-success)}
.kpi-value.gold{color:var(--pa-gold-dark)}
.kpi-sub{margin-top:8px;font-size:13px;color:var(--pa-text-muted)}

.card{background:white;border-radius:12px;box-shadow:var(--shadow-sm);margin-bottom:24px;overflow:hidden}
.card-header{padding:20px 24px;border-bottom:1px solid var(--pa-border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.card-title{font-size:16px;font-weight:700;color:var(--pa-navy)}
.card-body{padding:24px}
.card-body.no-padding{padding:0}

table.data-table{width:100%;border-collapse:collapse}
.data-table thead th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;color:var(--pa-text-muted);text-transform:uppercase;letter-spacing:0.05em;background:#F7F8FA;border-bottom:1px solid var(--pa-border);white-space:nowrap}
.data-table tbody td{padding:14px 16px;font-size:13px;color:var(--pa-text);border-bottom:1px solid var(--pa-border)}
.data-table tbody tr{transition:background .15s}
.data-table tbody tr:hover{background:#F7F8FA}
.data-table tbody tr:last-child td{border-bottom:none}

.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-success{background:#D1FAE5;color:#065F46}
.badge-danger{background:#FEE2E2;color:#991B1B}
.badge-warning{background:#FEF3C7;color:#92400E}
.badge-info{background:#DBEAFE;color:#1E40AF}
.badge-grey{background:#F3F4F6;color:#374151}

.score-bar{display:inline-flex;align-items:center;gap:8px;min-width:120px}
.score-bar-track{flex:1;height:8px;background:#F3F4F6;border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.score-bar-fill.high{background:linear-gradient(90deg,var(--pa-success),#34D399)}
.score-bar-fill.medium{background:linear-gradient(90deg,var(--pa-warning),#FBBF24)}
.score-bar-fill.low{background:linear-gradient(90deg,var(--pa-danger),#F87171)}
.score-value{font-weight:700;min-width:36px;text-align:right}
.score-value.high{color:var(--pa-success)}
.score-value.medium{color:var(--pa-warning)}
.score-value.low{color:var(--pa-danger)}

.empty-state{text-align:center;padding:60px 24px;color:var(--pa-text-muted)}
.empty-state h3{font-size:18px;font-weight:700;color:var(--pa-navy);margin-bottom:8px}
.empty-state p{margin-bottom:24px;max-width:480px;margin-left:auto;margin-right:auto}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite}
.spinner.dark{border-color:rgba(22,46,72,0.2);border-top-color:var(--pa-navy)}
@keyframes spin{to{transform:rotate(360deg)}}

.loading-overlay{position:fixed;inset:0;background:rgba(22,46,72,0.85);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px;color:white}
.loading-overlay .spinner{width:48px;height:48px;border-width:3px}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--pa-text)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--pa-grey-light);border-radius:8px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pa-navy)}
.form-help{font-size:12px;color:var(--pa-text-muted);margin-top:4px}

.toast{position:fixed;bottom:24px;right:24px;background:var(--pa-navy);color:white;padding:14px 20px;border-radius:8px;box-shadow:var(--shadow-lg);z-index:1001;font-size:14px;max-width:400px;animation:slideIn .3s ease}
.toast.success{background:var(--pa-success)}
.toast.error{background:var(--pa-danger)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

@media(max-width:900px){.sidebar{width:200px}.content{padding:20px}.topbar{padding:16px 20px}}

.text-link{color:var(--pa-navy);text-decoration:underline;cursor:pointer;font-weight:500}
.text-link:hover{color:var(--pa-navy-medium)}
.text-muted{color:var(--pa-text-muted)}
.text-right{text-align:right}
.text-center{text-align:center}
.font-mono{font-family:'SF Mono','Monaco','Consolas',monospace;font-size:12px}

.banner{padding:14px 18px;border-radius:8px;margin-bottom:20px;font-size:13px;display:flex;align-items:center;gap:12px}
.banner-info{background:#EFF6FF;color:#1E40AF;border-left:4px solid #3B82F6}

.board-config-row{display:grid;grid-template-columns:1fr 200px 200px 200px 100px;gap:12px;padding:14px 16px;border-bottom:1px solid var(--pa-border);align-items:center}
.board-config-row.header{background:#F7F8FA;font-size:11px;text-transform:uppercase;font-weight:600;color:var(--pa-text-muted);letter-spacing:0.05em}
.board-config-row select{width:100%;padding:6px 10px;border:1px solid var(--pa-border);border-radius:6px;font-size:13px;background:white}
.board-config-row.disabled{opacity:0.5}

.toggle-switch{width:36px;height:20px;background:var(--pa-grey-light);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--pa-success)}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,0.2)}
.toggle-switch.on::after{transform:translateX(16px)}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { h, render } from 'https://esm.sh/preact@10.22.0';
import { useState, useEffect, useMemo, useCallback } from 'https://esm.sh/preact@10.22.0/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';

const html = htm.bind(h);

// ===========================================================================
// CONFIGURAÇÃO — substituir os 3 valores abaixo
// ===========================================================================
const SUPABASE_URL = 'https://ousoxrtvkgfcgwrgmdlb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91c294cnR2a2dmY2d3cmdtZGxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODAzNTQsImV4cCI6MjA5MzE1NjM1NH0.56zBGzmeaDhBgUpiI-LIkJZcxVfCWWzdznG7_Gxg3-A';
const MONDAY_PROXY_URL = 'https://pa-ceo-monday.geral-pa-legal.workers.dev';

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ===========================================================================
// Helpers
// ===========================================================================
const DONE_STATUS_DEFAULTS = ['Concluído','Concluido','Done','Feito','Pronto','Terminado','Fechado','Closed'];

function fmtDate(d){
  if(!d) return '—';
  try{ return new Date(d).toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'}); }
  catch{ return d; }
}

function daysBetween(d1,d2){
  if(!d1||!d2) return 0;
  return Math.floor((new Date(d2)-new Date(d1))/(1000*60*60*24));
}

function classifyScore(score){
  if(score>=70) return 'high';
  if(score>=40) return 'medium';
  return 'low';
}

function filterByPeriod(items,period,customStart,customEnd){
  if(period==='all') return items;
  const now = new Date();
  let start,end;
  if(period==='month'){ start = new Date(now.getFullYear(),now.getMonth(),1); end = new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59); }
  else if(period==='quarter'){ const q = Math.floor(now.getMonth()/3); start = new Date(now.getFullYear(),q*3,1); end = new Date(now.getFullYear(),q*3+3,0,23,59,59); }
  else if(period==='year'){ start = new Date(now.getFullYear(),0,1); end = new Date(now.getFullYear(),11,31,23,59,59); }
  else if(period==='custom' && customStart && customEnd){ start = new Date(customStart); end = new Date(customEnd+'T23:59:59'); }
  else return items;

  return items.filter(it=>{
    const ref = it.due_date || it.updated_at_monday || it.created_at_monday;
    if(!ref) return true;
    const d = new Date(ref);
    return d>=start && d<=end;
  });
}

function showToast(message,type='info'){
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = message;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

// ===========================================================================
// Monday API
// ===========================================================================
async function mondayQuery(query,variables={}){
  if(MONDAY_PROXY_URL.includes('SEU-SUBDOMINIO')){
    throw new Error('MONDAY_PROXY_URL não está configurado em index.html. Edita o ficheiro e cola o URL do Worker.');
  }
  const r = await fetch(MONDAY_PROXY_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query,variables})
  });
  const data = await r.json();
  if(data.errors){
    console.error('Monday API errors:',data.errors);
    throw new Error(data.errors[0]?.message || 'Erro Monday API');
  }
  return data.data;
}

async function fetchMondayBoardsList(){
  const q = `query {
    boards(limit:200, state:active) {
      id
      name
      workspace { id name }
      columns { id title type }
    }
  }`;
  const data = await mondayQuery(q);
  return data.boards || [];
}

async function fetchMondayItemsForBoard(boardId){
  const allItems = [];
  let cursor = null;
  for(let i=0;i<20;i++){
    const q = cursor
      ? `query { next_items_page(limit:500, cursor:"${cursor}"){ cursor items { id name state created_at updated_at column_values { id type text value column { id title } } } } }`
      : `query { boards(ids:[${boardId}]){ items_page(limit:500){ cursor items { id name state created_at updated_at column_values { id type text value column { id title } } } } } }`;
    const data = await mondayQuery(q);
    let page;
    if(cursor) page = data.next_items_page;
    else page = data.boards?.[0]?.items_page;
    if(!page) break;
    allItems.push(...(page.items||[]));
    if(!page.cursor) break;
    cursor = page.cursor;
  }
  return allItems;
}

function extractItemFields(mondayItem,boardConfig){
  const cols = mondayItem.column_values || [];
  const findCol = id => cols.find(c=>c.id===id);

  let statusLabel=null,statusIndex=null;
  if(boardConfig.status_column_id){
    const c = findCol(boardConfig.status_column_id);
    if(c){
      statusLabel = c.text || null;
      try{ const v = c.value ? JSON.parse(c.value) : null; statusIndex = v?.index ?? null; }catch{}
    }
  }

  let personName=null,personId=null;
  if(boardConfig.person_column_id){
    const c = findCol(boardConfig.person_column_id);
    if(c){
      personName = c.text || null;
      try{ const v = c.value ? JSON.parse(c.value) : null; if(v?.personsAndTeams) personId = v.personsAndTeams.map(p=>p.id).join(','); }catch{}
    }
  }

  let dueDate=null;
  if(boardConfig.date_column_id){
    const c = findCol(boardConfig.date_column_id);
    if(c){
      try{ const v = c.value ? JSON.parse(c.value) : null; dueDate = v?.date || null; }
      catch{ if(c.text) dueDate = c.text; }
    }
  }

  const doneLabels = boardConfig.done_status_labels || DONE_STATUS_DEFAULTS;
  const isDone = statusLabel ? doneLabels.some(l=>l.toLowerCase()===statusLabel.toLowerCase()) : false;
  const today = new Date(); today.setHours(0,0,0,0);
  const isOverdue = !isDone && dueDate ? new Date(dueDate) < today : false;

  return { status_label:statusLabel, status_index:statusIndex, person_name:personName, person_id:personId, due_date:dueDate, is_done:isDone, is_overdue:isOverdue };
}

// ===========================================================================
// LOGIN
// ===========================================================================
function LoginScreen({onLogin}){
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [error,setError] = useState('');
  const [loading,setLoading] = useState(false);

  const handleSubmit = async ()=>{
    setLoading(true);
    setError('');
    try{
      const {data,error} = await sb.auth.signInWithPassword({email,password});
      if(error) throw error;
      const {data:profile} = await sb.from('profiles').select('role,full_name').eq('id',data.user.id).single();
      if(!profile || profile.role !== 'admin'){
        await sb.auth.signOut();
        throw new Error('Esta tool só está disponível para administradores P&A.');
      }
      onLogin(data.user,profile);
    }catch(e){ setError(e.message || 'Erro no login'); }
    finally{ setLoading(false); }
  };

  return html`
    <div class="login-screen">
      <div class="login-box">
        <div class="login-logo">
          <h1>P&A CEO Dashboard</h1>
          <p>Acesso restrito a administradores</p>
        </div>
        <label>Email</label>
        <input type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="email@pa-legal.pt" />
        <label>Password</label>
        <input type="password" value=${password} onInput=${e=>setPassword(e.target.value)}
               onKeyDown=${e=>e.key==='Enter'&&handleSubmit()} />
        <button onClick=${handleSubmit} disabled=${loading || !email || !password}>
          ${loading ? html`<span class="spinner"></span>` : 'Entrar'}
        </button>
        ${error && html`<div class="login-error">${error}</div>`}
      </div>
    </div>
  `;
}

// ===========================================================================
// SIDEBAR
// ===========================================================================
function Sidebar({active,setActive,user,profile,onLogout}){

    {key:'boards',label:'Por área/quadro',icon:'📁'},

// ===========================================================================
// PERIOD FILTER
// ===========================================================================
function PeriodFilter({period,setPeriod,customStart,setCustomStart,customEnd,setCustomEnd}){
  const periods = [
    {key:'month',label:'Este mês'},
    {key:'quarter',label:'Trimestre'},
    {key:'year',label:'Este ano'},
    {key:'all',label:'Tudo'},
    {key:'custom',label:'Personalizado'}
  ];
  return html`
    <div>

function TeamRanking({byPerson,compact=false}){
  const ranked = useMemo(()=>{
    return Object.entries(byPerson)
      .filter(([p,s])=>p!=='Sem responsável' && s.total>=3)
      .map(([name,s])=>{
        const onTimeRate = s.done>0 ? (s.onTime/s.done)*100 : 0;
        const volumeNorm = Math.min(s.done/10,1)*100;
        const overduePenalty = Math.max(0,100-(s.overdue/Math.max(s.total,1))*200);
        const score = Math.round(onTimeRate*0.5 + volumeNorm*0.3 + overduePenalty*0.2);
        return {name,...s,score,onTimeRate:Math.round(onTimeRate)};
      })
      .sort((a,b)=>b.score-a.score);
  },[byPerson]);

  const list = compact ? ranked.slice(0,5) : ranked;

  if(list.length===0){
    return html`
      <div class="empty-state">
        <h3>Sem dados suficientes</h3>
        <p>É necessário pelo menos 3 tarefas por pessoa no período seleccionado para entrar no ranking.</p>
      </div>
    `;
  }

  return html`
    <table class="data-table">
      <thead><tr>
        <th style="width:40px">#</th>
        <th>Pessoa</th>
        <th>Score</th>
        <th class="text-right">Concluídas</th>
        <th class="text-right">A tempo</th>
        <th class="text-right">Em atraso</th>
        <th class="text-right">Total</th>
      </tr></thead>
      <tbody>
        ${list.map((p,i)=>{
          const cls = classifyScore(p.score);
          return html`
            <tr>
              <td><strong>${i+1}</strong></td>
              <td><strong>${p.name}</strong></td>
              <td>
                <div class="score-bar">
                  <div class="score-bar-track"><div class=${'score-bar-fill '+cls} style=${`width:${p.score}%`}></div></div>
                  <span class=${'score-value '+cls}>${p.score}</span>
                </div>
              </td>
              <td class="text-right">${p.done}</td>
              <td class="text-right"><span class="badge badge-success">${p.onTimeRate}%</span></td>
              <td class="text-right">${p.overdue>0?html`<span class="badge badge-danger">${p.overdue}</span>`:'0'}</td>
              <td class="text-right text-muted">${p.total}</td>
            </tr>
          `;
        })}
      </tbody>
    </table>
  `;
}

function Dashboard({items,boards,period,setPeriod,customStart,setCustomStart,customEnd,setCustomEnd,setView}){
  const filtered = useMemo(()=>filterByPeriod(items,period,customStart,customEnd),[items,period,customStart,customEnd]);

  const stats = useMemo(()=>{
    const active = filtered.filter(i=>!i.is_done && i.state!=='archived' && i.state!=='deleted');
    const overdue = filtered.filter(i=>i.is_overdue);
    const done = filtered.filter(i=>i.is_done);
    const byPerson = {};
    filtered.forEach(i=>{
      const p = i.person_name || 'Sem responsável';
      if(!byPerson[p]) byPerson[p]={total:0,done:0,overdue:0,onTime:0};
      byPerson[p].total++;
      if(i.is_done) byPerson[p].done++;
      if(i.is_overdue) byPerson[p].overdue++;
      if(i.is_done && i.due_date && i.completed_at && new Date(i.completed_at)<=new Date(i.due_date)){
        byPerson[p].onTime++;
      } else if(i.is_done && !i.due_date){
        byPerson[p].onTime++;
      }
    });
    const peopleArr = Object.entries(byPerson).filter(([p])=>p!=='Sem responsável');
    const avgScore = peopleArr.length ? peopleArr.reduce((acc,[_,s])=>{
      const onTimeRate = s.done>0 ? (s.onTime/s.done)*100 : 0;
      return acc + onTimeRate;
    },0) / peopleArr.length : 0;

    return { active:active.length, overdue:overdue.length, done:done.length, total:filtered.length, avgScore:Math.round(avgScore), byPerson };
  },[filtered]);

  const topOverdue = useMemo(()=>{
    return filtered.filter(i=>i.is_overdue)
      .sort((a,b)=>daysBetween(b.due_date,new Date())-daysBetween(a.due_date,new Date()))
      .slice(0,8);
  },[filtered]);

  return html`
    <div>
      <${PeriodFilter} period=${period} setPeriod=${setPeriod}
        customStart=${customStart} setCustomStart=${setCustomStart}
        customEnd=${customEnd} setCustomEnd=${setCustomEnd} />

      <div class="kpi-grid">
        <div class="kpi-card" onClick=${()=>setView('boards')}>
          <div class="kpi-label">Tarefas activas</div>
          <div class="kpi-value">${stats.active}</div>
          <div class="kpi-sub">Em ${boards.filter(b=>b.enabled).length} quadros</div>
        </div>
        <div class=${'kpi-card '+(stats.overdue>0?'urgent':'')} onClick=${()=>setView('overdue')}>
          <div class="kpi-label">Em atraso</div>
          <div class="kpi-value danger">${stats.overdue}</div>
          <div class="kpi-sub">Prazo já passou</div>
        </div>
        <div class="kpi-card" onClick=${()=>setView('team')}>
          <div class="kpi-label">Concluídas</div>
          <div class="kpi-value success">${stats.done}</div>
          <div class="kpi-sub">No período seleccionado</div>
        </div>
        <div class="kpi-card" onClick=${()=>setView('team')}>
          <div class="kpi-label">Cumprimento médio</div>
          <div class="kpi-value gold">${stats.avgScore}%</div>
          <div class="kpi-sub">Tarefas concluídas a tempo</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">⚠️ Top 8 tarefas mais atrasadas</div>
          <button class="btn btn-outline btn-sm" onClick=${()=>setView('overdue')}>Ver todas</button>
        </div>
        <div class="card-body no-padding">
          ${topOverdue.length===0 ? html`
            <div class="empty-state">
              <h3>🎉 Nada em atraso!</h3>
              <p>Não há tarefas com prazo passado no período seleccionado.</p>
            </div>
          ` : html`
            <table class="data-table">
              <thead><tr>
                <th>Tarefa</th><th>Responsável</th><th>Quadro</th><th>Prazo</th><th>Atraso</th><th></th>
              </tr></thead>
              <tbody>
                ${topOverdue.map(it=>{
                  const board = boards.find(b=>b.id===it.board_id);
                  const days = daysBetween(it.due_date,new Date());
                  return html`
                    <tr>
                      <td><strong>${it.name}</strong></td>
                      <td>${it.person_name || html`<span class="text-muted">—</span>`}</td>
                      <td><span class="badge badge-grey">${board?.name || '—'}</span></td>
                      <td>${fmtDate(it.due_date)}</td>
                      <td><span class="badge badge-danger">${days} dias</span></td>
                      <td>${it.monday_url && html`<a href=${it.monday_url} target="_blank" class="text-link">Abrir →</a>`}</td>
                    </tr>
                  `;
                })}
              </tbody>
            </table>
          `}
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">🏆 Top performers</div>
          <button class="btn btn-outline btn-sm" onClick=${()=>setView('team')}>Ver todos</button>
        </div>
        <div class="card-body no-padding">
          <${TeamRanking} byPerson=${stats.byPerson} compact=${true} />
        </div>
      </div>
    </div>
  `;
}

function BoardsView({items,boards,period,setPeriod,customStart,setCustomStart,customEnd,setCustomEnd}){

  const byBoard = useMemo(()=>{
    const obj = {};
    boards.filter(b=>b.enabled).forEach(b=>{
      obj[b.id] = {board:b,total:0,active:0,done:0,overdue:0};
    });
    filtered.forEach(i=>{
      if(!obj[i.board_id]) return;
      obj[i.board_id].total++;

      else obj[i.board_id].active++;
      if(i.is_overdue) obj[i.board_id].overdue++;

  },[filtered,boards]);

  return html`

                      </td>
                    </tr>
                  `;
                })}
              </tbody>
            </table>
          `}
        </div>
      </div>
    </div>
  `;
}

function ConfigView({onSyncDone}){
  const [boards,setBoards] = useState([]);
  const [savedBoards,setSavedBoards] = useState([]);
  const [loading,setLoading] = useState(false);
  const [discovering,setDiscovering] = useState(false);
  const [syncing,setSyncing] = useState(false);
  const [progress,setProgress] = useState('');
  const [subdomain,setSubdomain] = useState(localStorage.getItem('pa_monday_subdomain') || 'pa-legal');

  useEffect(()=>{
    (async ()=>{
      setLoading(true);
      const {data} = await sb.from('monday_boards').select('*').order('name');
      setSavedBoards(data || []);
      setLoading(false);
    })();
  },[]);

  const guessColumn = (cols,keywords)=>{
    if(!cols) return null;
    for(const k of keywords){
      const c = cols.find(c=>c.title.toLowerCase().includes(k));
      if(c) return c.id;
    }
    return null;
  };

  const discoverBoards = async ()=>{
    setDiscovering(true);
    setProgress('A obter lista de quadros do Monday...');
    try{
      const fetched = await fetchMondayBoardsList();
      const merged = fetched.map(b=>{
        const existing = savedBoards.find(s=>String(s.id)===String(b.id));
        return {
          id:Number(b.id),
          name:b.name,
          workspace_name:b.workspace?.name || '',
          columns:b.columns || [],
          enabled:existing?.enabled ?? false,
          status_column_id:existing?.status_column_id || guessColumn(b.columns,['status','estado','situação']),
          person_column_id:existing?.person_column_id || guessColumn(b.columns,['responsável','responsavel','person','people','assignee','dono']),
          date_column_id:existing?.date_column_id || guessColumn(b.columns,['prazo','data','due','date','deadline','vencimento']),
          done_status_labels:existing?.done_status_labels || DONE_STATUS_DEFAULTS
        };
      });
      setBoards(merged);
      showToast(`Encontrados ${merged.length} quadros`,'success');
    }catch(e){
      showToast('Erro: '+e.message,'error');
    }finally{
      setDiscovering(false);
      setProgress('');
    }
  };

  const updateBoard = (id,changes)=>{
    setBoards(boards.map(b=>b.id===id?{...b,...changes}:b));
  };

  const saveConfig = async ()=>{
    setLoading(true);
    try{
      for(const b of boards){
        await sb.from('monday_boards').upsert({
          id:b.id,
          name:b.name,
          workspace_name:b.workspace_name,
          enabled:b.enabled,
          status_column_id:b.status_column_id,
          person_column_id:b.person_column_id,
          date_column_id:b.date_column_id,
          done_status_labels:b.done_status_labels
        },{onConflict:'id'});
      }
      const {data:fresh} = await sb.from('monday_boards').select('*').order('name');
      setSavedBoards(fresh || []);
      showToast('Configuração guardada','success');
    }catch(e){
      showToast('Erro a guardar: '+e.message,'error');
    }finally{
      setLoading(false);
    }
  };

  const syncNow = async ()=>{
    setSyncing(true);
    let totalItems = 0;
    const enabled = savedBoards.filter(b=>b.enabled);
    if(enabled.length===0){
      showToast('Activa pelo menos um quadro antes de sincronizar','error');
      setSyncing(false);
      return;
    }
    const {data:logRow} = await sb.from('monday_sync_log').insert({status:'running'}).select().single();

    try{
      for(let i=0;i<enabled.length;i++){
        const b = enabled[i];
        setProgress(`A sincronizar "${b.name}" (${i+1}/${enabled.length})...`);
        const items = await fetchMondayItemsForBoard(b.id);

        await sb.from('monday_items').delete().eq('board_id',b.id);

        const rows = items.map(it=>{
          const fields = extractItemFields(it,b);
          return {
            id:Number(it.id),
            board_id:b.id,
            name:it.name,
            state:it.state,
            ...fields,
            monday_url:`https://${subdomain}.monday.com/boards/${b.id}/pulses/${it.id}`,
            raw_columns:it.column_values,
            created_at_monday:it.created_at,
            updated_at_monday:it.updated_at,
            completed_at:fields.is_done ? it.updated_at : null,
            synced_at:new Date().toISOString()
          };
        });

        for(let j=0;j<rows.length;j+=500){
          const chunk = rows.slice(j,j+500);
          await sb.from('monday_items').upsert(chunk,{onConflict:'id'});
        }
        totalItems += rows.length;

        await sb.from('monday_boards').update({last_synced_at:new Date().toISOString()}).eq('id',b.id);
      }

      await sb.from('monday_sync_log').update({
        finished_at:new Date().toISOString(),
        status:'success',
        boards_synced:enabled.length,
        items_synced:totalItems
      }).eq('id',logRow.id);

      showToast(`Sincronização concluída — ${totalItems} items de ${enabled.length} quadros`,'success');
      const {data:fresh} = await sb.from('monday_boards').select('*').order('name');
      setSavedBoards(fresh || []);
      onSyncDone();
    }catch(e){
      await sb.from('monday_sync_log').update({
        finished_at:new Date().toISOString(),
        status:'error',
        error_message:e.message
      }).eq('id',logRow.id);
      showToast('Erro na sincronização: '+e.message,'error');
    }finally{
      setSyncing(false);
      setProgress('');
    }
  };

  const displayBoards = boards.length>0 ? boards : savedBoards;

  return html`
    <div>
      <div class="banner banner-info">
        <div>
          <strong>Como funciona:</strong> 1) Carrega "Carregar quadros do Monday" para descobrir os teus quadros.
          2) Para cada quadro que queres incluir, activa o toggle e selecciona as colunas-chave.
          3) Guarda configuração. 4) Sincroniza para puxar os dados.
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Quadros do Monday</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline" onClick=${discoverBoards} disabled=${discovering}>
              ${discovering ? html`<span class="spinner dark"></span>` : '🔄'} Carregar quadros do Monday
            </button>
            <button class="btn btn-primary" onClick=${saveConfig} disabled=${loading || boards.length===0}>
              ${loading ? html`<span class="spinner"></span>` : '💾'} Guardar configuração
            </button>
            <button class="btn btn-gold" onClick=${syncNow} disabled=${syncing || savedBoards.filter(b=>b.enabled).length===0}>
              ${syncing ? html`<span class="spinner dark"></span>` : '⚡'} Sincronizar agora
            </button>
          </div>
        </div>
        ${progress && html`<div style="padding:12px 24px;background:#FEF3C7;color:#92400E;font-size:13px">⏳ ${progress}</div>`}

        <div class="card-body no-padding">
          ${displayBoards.length===0 ? html`
            <div class="empty-state">
              <h3>Sem quadros configurados</h3>
              <p>Carrega "Carregar quadros do Monday" para começar.</p>
            </div>
          ` : html`
            <div class="board-config-row header">
              <div>Quadro</div>
              <div>Coluna de estado</div>
              <div>Coluna de responsável</div>
              <div>Coluna de prazo</div>
              <div class="text-center">Activo</div>
            </div>
            ${displayBoards.map(b=>{
              const cols = b.columns || [];
              const colsAvailable = cols.length > 0;
              return html`
                <div class=${'board-config-row '+(b.enabled?'':'disabled')}>
                  <div>
                    <strong>${b.name}</strong>
                    ${b.workspace_name && html`<div class="text-muted" style="font-size:11px">${b.workspace_name}</div>`}
                  </div>
                  <div>
                    ${colsAvailable ? html`
                      <select value=${b.status_column_id||''} onChange=${e=>updateBoard(b.id,{status_column_id:e.target.value})}>
                        <option value="">—</option>
                        ${cols.filter(c=>c.type==='status' || c.type==='color').map(c=>html`<option value=${c.id}>${c.title}</option>`)}
                      </select>
                    ` : html`<span class="text-muted font-mono">${b.status_column_id||'—'}</span>`}
                  </div>
                  <div>
                    ${colsAvailable ? html`
                      <select value=${b.person_column_id||''} onChange=${e=>updateBoard(b.id,{person_column_id:e.target.value})}>
                        <option value="">—</option>
                        ${cols.filter(c=>c.type==='people' || c.type==='person' || c.type==='multiple-person').map(c=>html`<option value=${c.id}>${c.title}</option>`)}
                      </select>
                    ` : html`<span class="text-muted font-mono">${b.person_column_id||'—'}</span>`}
                  </div>
                  <div>
                    ${colsAvailable ? html`
                      <select value=${b.date_column_id||''} onChange=${e=>updateBoard(b.id,{date_column_id:e.target.value})}>
                        <option value="">—</option>
                        ${cols.filter(c=>c.type==='date' || c.type==='timeline').map(c=>html`<option value=${c.id}>${c.title}</option>`)}
                      </select>
                    ` : html`<span class="text-muted font-mono">${b.date_column_id||'—'}</span>`}
                  </div>
                  <div class="text-center">
                    <div class=${'toggle-switch '+(b.enabled?'on':'')} onClick=${()=>{
                      if(boards.length>0) updateBoard(b.id,{enabled:!b.enabled});
                      else {
                        sb.from('monday_boards').update({enabled:!b.enabled}).eq('id',b.id).then(()=>{
                          setSavedBoards(savedBoards.map(s=>s.id===b.id?{...s,enabled:!s.enabled}:s));
                        });
                      }
                    }}></div>
                  </div>
                </div>
              `;
            })}
          `}
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Configuração geral</div></div>
        <div class="card-body">
          <div class="form-group">
            <label>Subdomínio do Monday (para gerar links directos)</label>
            <input type="text" placeholder="pa-legal" value=${subdomain}
                   onChange=${e=>{setSubdomain(e.target.value);localStorage.setItem('pa_monday_subdomain',e.target.value);showToast('Guardado','success')}} />
            <div class="form-help">É a parte que aparece antes de <code>.monday.com</code> no URL.</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ===========================================================================
// MAIN APP
// ===========================================================================
function App(){
  const [user,setUser] = useState(null);
  const [profile,setProfile] = useState(null);
  const [view,setView] = useState('dashboard');
  const [items,setItems] = useState([]);
  const [boards,setBoards] = useState([]);
  const [loading,setLoading] = useState(true);
  const [period,setPeriod] = useState('all');
  const [customStart,setCustomStart] = useState('');
  const [customEnd,setCustomEnd] = useState('');

  useEffect(()=>{
    (async ()=>{
      const {data:{session}} = await sb.auth.getSession();
      if(session){
        const {data:p} = await sb.from('profiles').select('role,full_name').eq('id',session.user.id).single();
        if(p && p.role==='admin'){
          setUser(session.user);
          setProfile(p);
        }
      }
      setLoading(false);
    })();
  },[]);

  const loadData = useCallback(async ()=>{
    if(!user) return;
    setLoading(true);
    const [{data:b},{data:i}] = await Promise.all([
      sb.from('monday_boards').select('*').order('name'),
      sb.from('monday_items').select('*').limit(20000)
    ]);
    setBoards(b || []);
    setItems(i || []);
    setLoading(false);
  },[user]);

  useEffect(()=>{loadData()},[loadData]);

  const handleLogout = async ()=>{
    await sb.auth.signOut();
    setUser(null);
    setProfile(null);
  };

  if(loading && !user){
    return html`<div class="loading-overlay"><div class="spinner"></div><div>A carregar...</div></div>`;
  }

  if(!user){
    return html`<${LoginScreen} onLogin=${(u,p)=>{setUser(u);setProfile(p)}} />`;
  }

  const titles = {
    dashboard:'Dashboard',
    overdue:'Tarefas em atraso',
    team:'Por pessoa',
    boards:'Por área/quadro',
    config:'Configuração'
  };

  return html`
    <div class="app">
      <${Sidebar} active=${view} setActive=${setView} user=${user} profile=${profile} onLogout=${handleLogout} />
      <main class="main">
        <div class="topbar">
          <div class="topbar-title">${titles[view]}</div>
          <div class="topbar-actions">
            ${view !== 'config' && html`
              <button class="btn btn-outline btn-sm" onClick=${loadData} disabled=${loading}>
                ${loading ? html`<span class="spinner dark"></span>` : '↻'} Actualizar
              </button>
            `}
          </div>
        </div>
        <div class="content">
          ${loading ? html`
            <div style="text-align:center;padding:80px"><div class="spinner dark" style="width:32px;height:32px"></div></div>
          ` : html`
            ${view==='dashboard' && html`<${Dashboard} items=${items} boards=${boards}
              period=${period} setPeriod=${setPeriod}
              customStart=${customStart} setCustomStart=${setCustomStart}
              customEnd=${customEnd} setCustomEnd=${setCustomEnd}
              setView=${setView} />`}
            ${view==='overdue' && html`<${OverdueView} items=${items} boards=${boards}
              period=${period} setPeriod=${setPeriod}
              customStart=${customStart} setCustomStart=${setCustomStart}
              customEnd=${customEnd} setCustomEnd=${setCustomEnd} />`}
            ${view==='team' && html`<${TeamView} items=${items}
              period=${period} setPeriod=${setPeriod}
              customStart=${customStart} setCustomStart=${setCustomStart}
              customEnd=${customEnd} setCustomEnd=${setCustomEnd} />`}
            ${view==='boards' && html`<${BoardsView} items=${items} boards=${boards}
              period=${period} setPeriod=${setPeriod}
              customStart=${customStart} setCustomStart=${setCustomStart}
              customEnd=${customEnd} setCustomEnd=${setCustomEnd} />`}
            ${view==='config' && html`<${ConfigView} onSyncDone=${loadData} />`}
          `}
        </div>
      </main>
    </div>
  `;
}

render(html`<${App} />`,document.getElementById('app'));
</script>
</body>
</html>
